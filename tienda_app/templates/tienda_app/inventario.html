<h2>Inventario</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Precio</th>
        <th>Stock</th>
    </tr>
    {% for libro in libros %}
    <tr>
        <td>{{ libro.id }}</td>
        <td>{{ libro.titulo }}</td>
        <td>{{ libro.precio }}</td>
        <td>{{ libro.inventario.cantidad }}</td>
    </tr>
    {% endfor %}
</table>
